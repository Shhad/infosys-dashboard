<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --font: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
    --bg: #f5f6f8;
    --surface: #ffffff;
    --line: #e7e8ee;
    --line-soft: #eef0f4;
    --ink: #1c1e26;
    --muted: #6b7080;
    --faint: #9a9eb0;
    --primary: #5b5bf0;
    --primary-ink: #ffffff;

    /* status palette — shared hue per stage */
    --c-open:  #7b8194;
    --c-todo:  #d98a1f;
    --c-prog:  #2f7be0;
    --c-rev:   #8b5cf6;
    --c-done:  #1f9d6b;
  }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
  }
  .num { font-variant-numeric: tabular-nums; }

  /* ---------- top bar ---------- */
  header.topbar {
    height: 60px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 26px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
  }
  .topbar .logo {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, #5b5bf0, #8a7bff);
    display: grid; place-items: center;
    color: #fff; font-weight: 800; font-size: 15px;
    flex: none;
  }
  .topbar h1 { margin: 0; font-size: 17px; font-weight: 800; letter-spacing: -0.02em; }
  .topbar .right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .topbar .who { display: flex; align-items: center; gap: 9px; }
  .topbar .who .av { width: 30px; height: 30px; border-radius: 50%; background: #5b5bf0;
    color: #fff; font-weight: 700; font-size: 12px; display: grid; place-items: center; flex: none; }
  .topbar .who .meta .e { font-size: 13px; font-weight: 600; line-height: 1.1; }
  .topbar .who .meta .r { font-size: 11px; color: var(--faint); font-weight: 700; letter-spacing: .06em; }
  .topbar .logout {
    font-family: inherit; font-size: 13px; font-weight: 600; color: var(--muted);
    background: transparent; border: 1px solid var(--line); border-radius: 9px;
    padding: 7px 13px; cursor: pointer;
  }
  .topbar .logout:hover { background: var(--bg); color: var(--ink); }

  /* ---------- toolbar ---------- */
  .toolbar {
    display: flex; align-items: center; gap: 14px;
    padding: 20px 26px 6px;
  }
  .toolbar .title { font-size: 20px; font-weight: 800; letter-spacing: -0.025em; }
  .toolbar .sub { font-size: 13px; color: var(--muted); font-weight: 600; }
  .toolbar .search {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
    padding: 8px 12px; width: 220px; color: var(--faint); font-size: 13px;
  }
  .toolbar .search .mag { width: 13px; height: 13px; border: 1.8px solid currentColor; border-radius: 50%; flex: none; }
  .toolbar .create {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: inherit; font-size: 13.5px; font-weight: 700;
    color: var(--primary-ink); background: var(--primary);
    border: none; border-radius: 10px; padding: 10px 16px; cursor: pointer;
    box-shadow: 0 6px 16px -6px rgba(91,91,240,.6);
  }
  .toolbar .create:hover { filter: brightness(1.05); }
  .toolbar .create .plus { font-size: 16px; line-height: 1; margin-top: -1px; }

  /* ---------- board ---------- */
  .board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    padding: 16px 26px 32px;
    align-items: start;
  }
  .col { display: flex; flex-direction: column; min-width: 0; }
  .col-head {
    display: flex; align-items: center; gap: 9px;
    padding: 4px 6px 12px;
  }
  .col-head .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .col-head .name { font-size: 12.5px; font-weight: 800; letter-spacing: .04em; color: var(--ink); }
  .col-head .count {
    font-size: 11.5px; font-weight: 700; color: var(--muted);
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 999px; padding: 1px 8px; min-width: 22px; text-align: center;
  }
  .col-head .add {
    margin-left: auto; width: 24px; height: 24px; border-radius: 7px;
    display: grid; place-items: center; color: var(--faint); font-size: 17px;
    cursor: pointer; border: 1px solid transparent;
  }
  .col-head .add:hover { background: var(--surface); border-color: var(--line); color: var(--ink); }

  .col-body {
    display: flex; flex-direction: column; gap: 11px;
    background: #eef0f4;
    border-radius: 14px;
    padding: 11px;
    min-height: 120px;
  }

  /* ---------- card ---------- */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 13px 14px 12px;
    box-shadow: 0 1px 2px rgba(20,22,30,.04);
    transition: box-shadow .15s ease, transform .15s ease, border-color .15s ease;
    cursor: grab;
  }
  .card:hover { box-shadow: 0 8px 20px -10px rgba(20,22,30,.22); border-color: #dcdee8; transform: translateY(-1px); }
  .card .chead { display: flex; align-items: flex-start; gap: 8px; }
  .card .ctitle { font-size: 14px; font-weight: 700; line-height: 1.3; flex: 1; min-width: 0; }
  .card .menu { color: var(--faint); font-weight: 800; letter-spacing: 1px; cursor: pointer; flex: none; padding: 0 2px; }
  .card .desc {
    font-size: 12.5px; color: var(--muted); line-height: 1.45; margin-top: 5px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10.5px; font-weight: 800; letter-spacing: .05em;
    border-radius: 6px; padding: 3px 8px; margin-top: 10px;
  }
  .card .badge .bd { width: 5px; height: 5px; border-radius: 50%; }

  .card .assignee {
    display: flex; align-items: center; gap: 9px;
    margin-top: 12px; padding-top: 11px; border-top: 1px solid var(--line-soft);
  }
  .card .assignee .pav {
    width: 24px; height: 24px; border-radius: 50%; flex: none;
    display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 10px;
  }
  .card .assignee .pav.empty { background: #eceef3; color: var(--faint); border: 1px dashed #cfd2dd; }
  .selectwrap { position: relative; flex: 1; min-width: 0; }
  .selectwrap select {
    appearance: none; -webkit-appearance: none;
    width: 100%; font-family: inherit; font-size: 12.5px; font-weight: 600; color: var(--ink);
    background: transparent; border: 1px solid transparent; border-radius: 8px;
    padding: 6px 26px 6px 9px; cursor: pointer;
    text-overflow: ellipsis; white-space: nowrap; overflow: hidden;
  }
  .selectwrap:hover select { background: var(--bg); border-color: var(--line); }
  .selectwrap select:focus { outline: none; background: var(--bg); border-color: var(--primary); }
  .selectwrap .chev {
    position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
    width: 7px; height: 7px; border-right: 1.6px solid var(--faint); border-bottom: 1.6px solid var(--faint);
    transform: translateY(-65%) rotate(45deg); pointer-events: none;
  }
  .selectwrap select.unassigned { color: var(--faint); font-weight: 600; }
</style>
</head>
<body>
  <header class="topbar">
    <span class="logo">T</span>
    <h1>Task Dashboard</h1>
    <div class="right">
      <div class="who">
        <span class="av">A</span>
        <div class="meta">
          <div class="e">admin@example.com</div>
          <div class="r">ADMIN</div>
        </div>
      </div>
      <button class="logout">Log out</button>
    </div>
  </header>

  <div class="toolbar">
    <span class="title">Board</span>
    <span class="sub">· 8 issues</span>
    <button class="create" style="margin-left:auto"><span class="plus">+</span> Create issue</button>
  </div>

  <main class="board" id="board"></main>

<script>
  const COLUMNS = [
    { key: "OPEN",        label: "OPEN",        color: "var(--c-open)", tint: "rgba(123,129,148,.12)" },
    { key: "TODO",        label: "TODO",        color: "var(--c-todo)", tint: "rgba(217,138,31,.13)" },
    { key: "IN_PROGRESS", label: "IN PROGRESS", color: "var(--c-prog)", tint: "rgba(47,123,224,.12)" },
    { key: "REVIEW",      label: "REVIEW",      color: "var(--c-rev)",  tint: "rgba(139,92,246,.13)" },
    { key: "DONE",        label: "DONE",        color: "var(--c-done)", tint: "rgba(31,157,107,.13)" },
  ];

  const PEOPLE = [
    "Unassigned",
    "alice2+1781701409@example.com",
    "u1@example.com",
    "u2@example.com",
    "test@test.com",
    "bob@example.com",
  ];

  const TASKS = {
    OPEN: [
      { title: "x", assignee: "alice2+1781701409@example.com" },
      { title: "admin->u2", assignee: "Unassigned" },
    ],
    TODO: [
      { title: "admin->u2", assignee: "u2@example.com" },
    ],
    IN_PROGRESS: [
      { title: "u1 own", assignee: "u1@example.com" },
      { title: "trololo", desc: "tralal", assignee: "u1@example.com" },
    ],
    REVIEW: [
      { title: "test test test", desc: "12edad asdsa das sad asd asd gvsdfsa fds fassda", assignee: "test@test.com" },
      { title: "test other user", desc: "sss", assignee: "bob@example.com" },
    ],
    DONE: [
      { title: "u1 own", assignee: "Unassigned" },
    ],
  };

  const AV_COLORS = ["#5b5bf0","#2f7be0","#1f9d6b","#d98a1f","#8b5cf6","#e0567b","#0ea5a5"];
  function avColor(s){ let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return AV_COLORS[h%AV_COLORS.length]; }
  function avInitial(email){ return (email[0]||"?").toUpperCase(); }

  function cardEl(t, col) {
    const card = document.createElement("div");
    card.className = "card";

    const head = document.createElement("div");
    head.className = "chead";
    const title = document.createElement("div");
    title.className = "ctitle";
    title.textContent = t.title;
    const menu = document.createElement("span");
    menu.className = "menu";
    menu.textContent = "···";
    head.append(title, menu);
    card.append(head);

    if (t.desc) {
      const d = document.createElement("div");
      d.className = "desc";
      d.textContent = t.desc;
      card.append(d);
    }

    const badge = document.createElement("span");
    badge.className = "badge";
    badge.style.color = col.color;
    badge.style.background = col.tint;
    const bd = document.createElement("span");
    bd.className = "bd"; bd.style.background = col.color;
    badge.append(bd, document.createTextNode(col.label));
    card.append(badge);

    const ass = document.createElement("div");
    ass.className = "assignee";
    const unassigned = t.assignee === "Unassigned";
    const pav = document.createElement("span");
    pav.className = "pav" + (unassigned ? " empty" : "");
    if (unassigned) { pav.textContent = "?"; }
    else { pav.textContent = avInitial(t.assignee); pav.style.background = avColor(t.assignee); }

    const sw = document.createElement("div");
    sw.className = "selectwrap";
    const sel = document.createElement("select");
    if (unassigned) sel.classList.add("unassigned");
    PEOPLE.forEach(p => {
      const o = document.createElement("option");
      o.value = p; o.textContent = p;
      if (p === t.assignee) o.selected = true;
      sel.append(o);
    });
    sel.addEventListener("change", () => {
      const v = sel.value;
      const un = v === "Unassigned";
      sel.classList.toggle("unassigned", un);
      pav.className = "pav" + (un ? " empty" : "");
      if (un) { pav.textContent = "?"; pav.style.background = ""; }
      else { pav.textContent = avInitial(v); pav.style.background = avColor(v); }
    });
    const chev = document.createElement("span");
    chev.className = "chev";
    sw.append(sel, chev);
    ass.append(pav, sw);
    card.append(ass);
    return card;
  }

  const board = document.getElementById("board");
  COLUMNS.forEach(col => {
    const list = TASKS[col.key] || [];
    const colEl = document.createElement("section");
    colEl.className = "col";
    colEl.setAttribute("data-screen-label", col.key);

    const head = document.createElement("div");
    head.className = "col-head";
    head.innerHTML =
      `<span class="dot" style="background:${col.color}"></span>` +
      `<span class="name">${col.label}</span>` +
      `<span class="count num">${list.length}</span>`;
    colEl.append(head);

    const body = document.createElement("div");
    body.className = "col-body";
    list.forEach(t => body.append(cardEl(t, col)));
    colEl.append(body);

    board.append(colEl);
  });
</script>
</body>
</html>
